<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>精准时钟 - 实时日期时间（含农历）</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%230a0e27' stroke='%233e6eff' stroke-width='4'/><line x1='50' y1='50' x2='50' y2='25' stroke='%23ffffff' stroke-width='4' stroke-linecap='round'/><line x1='50' y1='50' x2='65' y2='50' stroke='%2388aaff' stroke-width='3' stroke-linecap='round'/><circle cx='50' cy='50' r='3' fill='%233e6eff'/></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="clock-container">
        <div class="clock-main-content">
            <div class="clock-left">
            <!-- 日期时间区块 -->
            <div class="block block-datetime">
                <div class="block-header">
                    <span class="block-icon">📅</span>
                    <span class="block-title">公历 · 时间</span>
                </div>
                <div class="date-container">
                    <div class="date-box" id="dateDisplay">加载中...</div>
                </div>
                <div class="time-wrapper">
                    <span class="time-main" id="timeDisplay">--:--:--</span>
                    <span class="milliseconds" id="msDisplay">.---</span>
                </div>
                <div class="timezone-info">
                    <span class="info-chip" id="timezoneChip">🌍 自动检测时区</span>
                </div>
            </div>

            <!-- 农历时辰区块 -->
            <div class="block block-lunar">
                <div class="block-header">
                    <span class="block-icon">🌙</span>
                    <span class="block-title">农历 · 时辰</span>
                </div>
                <div class="lunar-shichen-row">
                    <div class="lunar-box" id="lunarDisplay">加载农历...</div>
                </div>
                <div class="bazi-row">
                    <div class="bazi-item">
                        <span class="bazi-label">年柱</span>
                        <span class="bazi-value" id="baziYear">--</span>
                    </div>
                    <div class="bazi-item">
                        <span class="bazi-label">月柱</span>
                        <span class="bazi-value" id="baziMonth">--</span>
                    </div>
                    <div class="bazi-item">
                        <span class="bazi-label">日柱</span>
                        <span class="bazi-value" id="baziDay">--</span>
                    </div>
                    <div class="bazi-item">
                        <span class="bazi-label">时柱</span>
                        <span class="bazi-value" id="baziTime">--</span>
                    </div>
                    <div class="bazi-calc-icon" id="baziCalcBtn" title="计算生辰八字">🧮</div>
                </div>
                <div class="shichen-timeline">
                    <div class="progress-header">
                        <div class="progress-left-group">
                            <span class="progress-shichen-name" id="progressShichenName">子时</span>
                            <span class="progress-shichen-detail" id="progressShichenDetail">23:00 - 01:00</span>
                        </div>
                        <div class="progress-right-group">
                            <span class="progress-elapsed" id="progressElapsed">已进 0分0秒</span>
                            <span class="progress-percent" id="progressPercent">0%</span>
                        </div>
                    </div>
                    <div class="progress-track" id="progressTrack">
                        <div class="progress-fill" id="progressFill"></div>
                        <div class="progress-thumb" id="progressThumb"></div>
                    </div>
                    <div class="progress-ke-labels" id="progressKeLabels"></div>
                </div>
            </div>
        </div>

        <!-- 右侧时辰对照 -->
        <div class="clock-right">
            <div class="shichen-reference">
                <div class="reference-title">十二时辰时间对照</div>
                <div class="reference-content" id="shichenReference"></div>
            </div>
        </div>
        <div class="clock-footer">
            🕒 实时刷新 ｜ 基于高精度计时器 ｜ 农历 + 公历
        </div>
    </div>

    <!-- 八字计算弹窗 -->
    <div class="modal-overlay" id="baziModalOverlay">
        <div class="modal-content" id="baziModal">
            <div class="modal-header">
                <span class="modal-title">🔮 计算生辰八字</span>
                <span class="modal-close" id="baziModalClose">✕</span>
            </div>
            <div class="modal-body">
                <!-- 步骤1：选择日期类型 -->
                <div class="bazi-step" id="baziStepType">
                    <div class="step-desc">请选择日期类型</div>
                    <div class="type-options">
                        <button class="type-btn active" data-type="solar" id="baziSolarBtn">☀️ 公历</button>
                        <button class="type-btn" data-type="lunar" id="baziLunarBtn">🌙 农历</button>
                    </div>
                </div>
                
                <!-- 步骤2：输入日期时间 -->
                <div class="bazi-step" id="baziStepInput">
                    <div class="input-group">
                        <div class="input-row">
                            <label>年</label>
                            <input type="number" id="baziInputYear" min="1900" max="2100" value="2026" class="bazi-input">
                        </div>
                        <div class="input-row">
                            <label>月</label>
                            <input type="number" id="baziInputMonth" min="1" max="12" value="1" class="bazi-input">
                        </div>
                        <div class="input-row">
                            <label>日</label>
                            <input type="number" id="baziInputDay" min="1" max="31" value="1" class="bazi-input">
                        </div>
                        <div class="input-row">
                            <label>时</label>
                            <input type="number" id="baziInputHour" min="0" max="23" value="12" class="bazi-input">
                        </div>
                    </div>
                    <div class="input-hint" id="baziInputHint">公历：2026年1月1日 12时</div>
                    <button class="calc-btn" id="baziCalcSubmit">开始计算</button>
                </div>
                
                <!-- 步骤3：显示结果 -->
                <div class="bazi-step" id="baziStepResult">
                    <div class="result-bazi" id="baziResultDisplay">
                        <div class="result-pillar">
                            <span class="pillar-label">年柱</span>
                            <span class="pillar-value" id="baziResultYear">--</span>
                        </div>
                        <div class="result-pillar">
                            <span class="pillar-label">月柱</span>
                            <span class="pillar-value" id="baziResultMonth">--</span>
                        </div>
                        <div class="result-pillar">
                            <span class="pillar-label">日柱</span>
                            <span class="pillar-value" id="baziResultDay">--</span>
                        </div>
                        <div class="result-pillar">
                            <span class="pillar-label">时柱</span>
                            <span class="pillar-value" id="baziResultTime">--</span>
                        </div>
                    </div>
                    <div class="result-info" id="baziResultInfo"></div>
                    <button class="calc-btn" id="baziCalcReset">重新计算</button>
                </div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
